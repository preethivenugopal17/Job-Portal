{% extends "jobs/base.html" %}
{% block title %}Password Reset Complete — JobPortal{% endblock %}
{% block content %}
<style>
    .success-card { background: white; border-radius: 12px; padding: 2.5rem; max-width: 480px; margin: 2rem auto; box-shadow: 0 1px 6px rgba(0,0,0,0.08); text-align: center; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    .success-card h2 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #111827; }
    .success-card p { color: #6b7280; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .login-btn { display: inline-block; background: #1a56db; color: white; padding: 0.75rem 2rem; border-radius: 8px; text-decoration: none; font-weight: 600; }
    .login-btn:hover { background: #1e429f; }
</style>

<div class="success-card">
    <div class="icon">✅</div>
    <h2>Password Reset Complete!!</h2>
    <p>Your password has been successfully reset!!
       You can now login with your new password.</p>
    <a href="{% url 'accounts:login' %}" class="login-btn">Login Now</a>
</div>
{% endblock %}
