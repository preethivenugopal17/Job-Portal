<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 2rem; }
        .card { background: white; border-radius: 12px; padding: 2rem; max-width: 500px; margin: 0 auto; }
        .header { background: #1a56db; color: white; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem; text-align: center; }
        .header h1 { font-size: 1.4rem; margin: 0; }
        .detail { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid #f3f4f6; font-size: 0.9rem; }
        .detail .label { color: #6b7280; font-weight: 600; }
        .detail .value { color: #111827; }
        .cover { background: #f9fafb; border-radius: 8px; padding: 1rem; margin-top: 1rem; font-size: 0.9rem; color: #374151; line-height: 1.7; }
        .footer { text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: #9ca3af; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>New Job Application Received!</h1>
        </div>

        <div class="detail">
            <span class="label">Job Title</span>
            <span class="value">{{ job_title }}</span>
        </div>
        <div class="detail">
            <span class="label">Applicant</span>
            <span class="value">{{ applicant_name }}</span>
        </div>
        <div class="detail">
            <span class="label">Email</span>
            <span class="value">{{ applicant_email }}</span>
        </div>
        <div class="detail">
            <span class="label">Applied On</span>
            <span class="value">{{ applied_date }}</span>
        </div>

        <p style="font-weight:600; margin-top:1rem; font-size:0.9rem;">Cover Letter:</p>
        <div class="cover">{{ cover_letter }}</div>

        <div class="footer">
            <p>This email was sent from JobPortal</p>
        </div>
    </div>
</body>
</html>
